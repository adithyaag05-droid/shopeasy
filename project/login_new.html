<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ShopEasy</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cart.css">
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-shopping-bag me-2"></i>ShopEasy
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">Categories</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="products.html?category=men">Men</a></li>
                            <li><a class="dropdown-item" href="products.html?category=women">Women</a></li>
                            <li><a class="dropdown-item" href="products.html?category=accessories">Accessories</a></li>
                        </ul>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="products.html">New Arrivals</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html?sale=true">Sale</a></li>
                </ul>
                <div class="d-flex align-items-center">
                    <button onclick="toggleCart()" class="btn btn-link text-white position-relative me-3">
                        <i class="fas fa-shopping-cart fs-5"></i>
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="cart-count">
                            0
                        </span>
                    </button>
                    <a href="login_new.html" class="btn btn-outline-light me-2">Login</a>
                </div>
            </div>
        </div>
    </nav>
     <div class="auth-container">
        <div class="auth-box">
            <form class="auth-form">
                <div class="form-group">
                    <h2>Welcome Back!</h2>
                    <p class="auth-subtitle">Login to your account</p>
                    
                    <div class="input-group">
                       
                        <input type="email" class="form-control" id="email" placeholder="Enter your email">
                    </div>
                </div>
                
                <div class="form-group">
                   
                    <div class="input-group">

                        <input type="password" class="form-control" id="password" placeholder="Enter your password">
                    </div>
                </div>

                <div class="form-options">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label" for="remember">Remember me</label>
                    </div>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary auth-button">Login</button>
                
                <div class="divider">
                    <span>or login with</span>
                </div>

                <div class="social-buttons">
                    <button type="button" class="btn btn-outline-dark social-button">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button type="button" class="btn btn-outline-dark social-button">
                        <i class="fab fa-facebook-f"></i> Facebook
                    </button>
                </div>

                <p class="auth-footer">
                    Don't have an account? <a href="signup.html">Sign up</a>
                </p>
            </form>
        </div>
    </div>

    <div id="cartPopup" class="cart-popup">
        <div class="cart-header">
            <h2>Shopping Cart</h2>
        </div>
        <div id="cartItems" class="cart-items">
    
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cartTotal">$0.00</span>
            </div>
            <button onclick="checkout()" class="checkout-btn">Checkout</button>
            <button onclick="toggleCart()" class="close-btn">Close</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="cart.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
        
            console.log('Login form submitted');
        });
    </script>
</body>
</html>
