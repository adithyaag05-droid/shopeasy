<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - ShopEasy</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="cart.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Inter', sans-serif;
        }

        .signup-container {
            max-width: 450px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        .signup-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .signup-header h1 {
            color: #333;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .signup-header p {
            color: #6c757d;
            font-size: 1rem;
        }

        .form-floating {
            margin-bottom: 1rem;
        }

        .form-floating input {
            border-radius: 8px;
            border: 1px solid #dee2e6;
            padding: 1rem;
            height: calc(3.5rem + 2px);
            font-size: 1rem;
        }

        .form-floating label {
            padding: 1rem;
        }

        .signup-btn {
            width: 100%;
            padding: 0.8rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            margin-top: 1rem;
            background-color: #0d6efd;
            border: none;
            transition: all 0.3s ease;
        }

        .signup-btn:hover {
            background-color: #0b5ed7;
            transform: translateY(-1px);
        }

        .signup-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: #6c757d;
        }

        .signup-footer a {
            color: #0d6efd;
            text-decoration: none;
            font-weight: 500;
        }

        .signup-footer a:hover {
            text-decoration: underline;
        }

        .social-signup {
            margin-top: 1.5rem;
            text-align: center;
        }

        .social-signup p {
            color: #6c757d;
            margin-bottom: 1rem;
            position: relative;
        }

        .social-signup p::before,
        .social-signup p::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background-color: #dee2e6;
        }

        .social-signup p::before {
            left: 0;
        }

        .social-signup p::after {
            right: 0;
        }

        .social-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .social-btn {
            padding: 0.5rem 1.5rem;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            background: white;
            color: #333;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .social-btn:hover {
            background-color: #f8f9fa;
            transform: translateY(-1px);
        }

        .social-btn i {
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-shopping-bag me-2"></i>ShopEasy
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">Categories</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="products.html?category=men">Men</a></li>
                            <li><a class="dropdown-item" href="products.html?category=women">Women</a></li>
                            <li><a class="dropdown-item" href="products.html?category=accessories">Accessories</a></li>
                        </ul>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="products.html">New Arrivals</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html?sale=true">Sale</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <button onclick="toggleCart()" class="btn btn-link text-white position-relative">
                        <i class="fas fa-shopping-cart fs-5"></i>
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="cart-count">
                            0
                        </span>
                    </button>
                    <a href="login_new.html" class="btn btn-outline-light">Login</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Cart Overlay -->
    <div class="cart-overlay" onclick="toggleCart()"></div>

    <!-- Cart Popup -->
    <div class="cart-popup">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <button class="close-cart" onclick="toggleCart()">×</button>
        </div>
        <div class="cart-items" id="cartItems">
            <!-- Cart items will be dynamically added here -->
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cartTotal">$0.00</span>
            </div>
            <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
        </div>
    </div>

    <div class="container">
        <div class="signup-container">
            <div class="signup-header">
                <h1>Create Account</h1>
                <p>Join ShopEasy for exclusive deals and offers</p>
            </div>
            <form method="POST" action="signup_handler.php">
                <div class="form-floating">
                    <input type="text" class="form-control" id="name" name="name" placeholder="Full Name" required>
                    <label for="name">Full Name</label>
                </div>
                <div class="form-floating">
                    <input type="email" class="form-control" id="email" name="email" placeholder="Email address" required>
                    <label for="email">Email address</label>
                </div>
                <div class="form-floating">
                    <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                    <label for="password">Password</label>
                </div>
                <button type="submit" class="btn btn-primary signup-btn">Create Account</button>
            </form>
            
            <div class="social-signup">
                <p>Or sign up with</p>
                <div class="social-buttons">
                    <button class="social-btn">
                        <i class="fab fa-google"></i>Google
                    </button>
                    <button class="social-btn">
                        <i class="fab fa-facebook-f"></i>Facebook
                    </button>
                </div>
            </div>
            
            <div class="signup-footer">
                Already have an account? <a href="login_new.html">Log in</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="cart.js"></script>
</body>
</html>
